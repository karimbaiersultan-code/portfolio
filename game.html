<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 Catch the Coins - Web Version</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-dark: #0f0a05;
            --primary-brown: #1a1410;
            --brown-accent: #8b6f47;
            --brown-light: #c4a574;
            --text-primary: #f5f1ed;
            --text-secondary: #bfb5a0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary-brown) 100%);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1rem;
        }

        .game-container {
            background: var(--primary-brown);
            border: 2px solid var(--brown-light);
            border-radius: 10px;
            padding: 2rem;
            max-width: 900px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .game-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .game-header h1 {
            font-size: 2rem;
            color: var(--brown-light);
            margin-bottom: 0.5rem;
        }

        .game-header p {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .game-canvas {
            display: block;
            background: #0f0a05;
            border: 2px solid var(--brown-accent);
            border-radius: 5px;
            margin: 0 auto 2rem;
            width: 100%;
            max-width: 100%;
            height: auto;
            aspect-ratio: 800 / 600;
        }

        .game-info {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .info-box {
            background: rgba(139, 111, 71, 0.2);
            border: 1px solid var(--brown-accent);
            border-radius: 5px;
            padding: 1rem;
            text-align: center;
        }

        .info-label {
            color: var(--text-secondary);
            font-size: 0.8rem;
            text-transform: uppercase;
            margin-bottom: 0.3rem;
        }

        .info-value {
            color: var(--brown-light);
            font-size: 1.8rem;
            font-weight: bold;
        }

        .game-controls {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 0.8rem 2rem;
            border: 2px solid var(--brown-light);
            background: transparent;
            color: var(--brown-light);
            font-size: 1rem;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.3s;
            font-weight: bold;
        }

        button:hover {
            background: var(--brown-light);
            color: var(--primary-dark);
            transform: translateY(-3px);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-primary {
            background: var(--brown-light);
            color: var(--primary-dark);
        }

        .btn-primary:hover {
            background: var(--text-primary);
        }

        .instructions {
            background: rgba(139, 111, 71, 0.1);
            border-left: 4px solid var(--brown-light);
            padding: 1.5rem;
            border-radius: 5px;
            margin-top: 2rem;
        }

        .instructions h3 {
            color: var(--brown-light);
            margin-bottom: 1rem;
        }

        .instructions ul {
            list-style: none;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
        }

        .instructions li {
            color: var(--text-secondary);
        }

        .instructions li strong {
            color: var(--brown-light);
        }

        .game-over-screen {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(15, 10, 5, 0.95);
            border-radius: 5px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-primary);
            z-index: 10;
            animation: fadeIn 0.3s;
        }

        .game-over-screen.show {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .game-over-content {
            text-align: center;
        }

        .game-over-content h2 {
            font-size: 3rem;
            color: var(--brown-accent);
            margin-bottom: 1rem;
        }

        .game-over-stats {
            margin: 2rem 0;
        }

        .game-stat {
            font-size: 1.2rem;
            margin: 0.5rem 0;
            color: var(--brown-light);
        }

        @media (max-width: 600px) {
            .game-container {
                padding: 1rem;
            }

            .game-header h1 {
                font-size: 1.5rem;
            }

            .game-info {
                grid-template-columns: 1fr;
            }

            .instructions ul {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <h1>🎮 Поймай Монеты</h1>
            <p>Catch the Coins - Web Version</p>
        </div>

        <canvas id="gameCanvas" class="game-canvas"></canvas>

        <div class="game-info">
            <div class="info-box">
                <div class="info-label">Счет</div>
                <div class="info-value" id="score">0</div>
            </div>
            <div class="info-box">
                <div class="info-label">Уровень</div>
                <div class="info-value" id="level">1</div>
            </div>
            <div class="info-box">
                <div class="info-label">Статус</div>
                <div class="info-value" id="status" style="font-size: 1rem;">Готово</div>
            </div>
        </div>

        <div class="game-controls">
            <button id="startBtn" class="btn-primary">▶️ Начать Игру</button>
            <button id="pauseBtn" disabled>⏸️ Пауза</button>
            <button id="resetBtn">🔄 Новая Игра</button>
        </div>

        <div class="instructions">
            <h3>📖 Как Играть</h3>
            <ul>
                <li><strong>← →</strong> Стрелки влево/вправо для движения</li>
                <li><strong>💰</strong> Собирайте монеты для очков</li>
                <li><strong>🚫</strong> Избегайте препятствий!</li>
                <li><strong>📈</strong> Уровень растет каждые 100 очков</li>
                <li><strong>⚡</strong> Игра становится сложнее с каждым уровнем</li>
            </ul>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Установка размера canvas
        function resizeCanvas() {
            const container = canvas.parentElement;
            canvas.width = Math.min(800, container.clientWidth - 4);
            canvas.height = (canvas.width / 800) * 600;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Константы и переменные
        const COLORS = {
            darkBg: '#0f0a05',
            brownBg: '#1a1410',
            brownAccent: '#8b6f47',
            brownLight: '#c4a574',
            text: '#f5f1ed',
            textSecondary: '#bfb5a0'
        };

        let gameState = {
            score: 0,
            level: 1,
            running: false,
            paused: false,
            gameOver: false
        };

        let player = {
            x: 0,
            y: 0,
            width: 40,
            height: 40,
            speed: 5
        };

        let coins = [];
        let obstacles = [];
        let keys = {};

        // Инициализация игрока
        function initPlayer() {
            player.x = canvas.width / 2 - player.width / 2;
            player.y = canvas.height - 50;
        }

        // Класс монеты
        class Coin {
            constructor() {
                this.x = Math.random() * (canvas.width - 30);
                this.y = -30;
                this.size = Math.random() * 10 + 15;
                this.speed = Math.random() * 3 + 2;
                this.rotation = 0;
            }

            update() {
                this.y += this.speed;
                this.rotation += 5;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x + this.size, this.y + this.size);
                ctx.rotate((this.rotation * Math.PI) / 180);

                ctx.fillStyle = COLORS.brownLight;
                ctx.beginPath();
                ctx.arc(0, 0, this.size, 0, Math.PI * 2);
                ctx.fill();

                ctx.strokeStyle = COLORS.brownAccent;
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(0, 0, this.size - 3, 0, Math.PI * 2);
                ctx.stroke();

                ctx.restore();
            }

            isOffScreen() {
                return this.y > canvas.height;
            }
        }

        // Класс препятствия
        class Obstacle {
            constructor() {
                this.width = Math.random() * 40 + 30;
                this.height = Math.random() * 40 + 30;
                this.x = Math.random() * (canvas.width - this.width);
                this.y = -this.height;
                this.speed = Math.random() * 2 + 2;
            }

            update() {
                this.y += this.speed;
            }

            draw() {
                ctx.fillStyle = COLORS.brownAccent;
                ctx.fillRect(this.x, this.y, this.width, this.height);

                ctx.strokeStyle = COLORS.brownLight;
                ctx.lineWidth = 2;
                ctx.strokeRect(this.x, this.y, this.width, this.height);
            }

            isOffScreen() {
                return this.y > canvas.height;
            }
        }

        // Рисование игрока
        function drawPlayer() {
            ctx.fillStyle = COLORS.brownLight;
            ctx.fillRect(player.x, player.y, player.width, player.height);

            ctx.fillStyle = COLORS.brownAccent;
            ctx.beginPath();
            ctx.arc(player.x + player.width / 2, player.y + player.height / 2, player.width / 2 - 5, 0, Math.PI * 2);
            ctx.fill();
        }

        // Обновление игрока
        function updatePlayer() {
            if (keys['ArrowLeft'] && player.x > 0) {
                player.x -= player.speed;
            }
            if (keys['ArrowRight'] && player.x < canvas.width - player.width) {
                player.x += player.speed;
            }
        }

        // Спавн объектов
        function spawnObjects() {
            // Спавн монет
            if (Math.random() < 0.02 * (gameState.level * 0.5)) {
                coins.push(new Coin());
            }

            // Спавн препятствий
            if (Math.random() < 0.01 * (gameState.level * 0.3)) {
                obstacles.push(new Obstacle());
            }
        }

        // Проверка столкновения
        function checkCollisions() {
            // Проверка столкновения с монетами
            for (let i = coins.length - 1; i >= 0; i--) {
                const coin = coins[i];
                const dx = (player.x + player.width / 2) - (coin.x + coin.size);
                const dy = (player.y + player.height / 2) - (coin.y + coin.size);
                const distance = Math.sqrt(dx * dx + dy * dy);

                if (distance < player.width / 2 + coin.size) {
                    gameState.score += 10;
                    coins.splice(i, 1);
                }
            }

            // Проверка столкновения с препятствиями
            for (let obstacle of obstacles) {
                if (
                    player.x < obstacle.x + obstacle.width &&
                    player.x + player.width > obstacle.x &&
                    player.y < obstacle.y + obstacle.height &&
                    player.y + player.height > obstacle.y
                ) {
                    gameOver();
                }
            }
        }

        // Обновление уровня
        function updateLevel() {
            gameState.level = Math.floor(gameState.score / 100) + 1;
        }

        // Рисование фона
        function drawBackground() {
            ctx.fillStyle = COLORS.darkBg;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Сетка
            ctx.strokeStyle = 'rgba(139, 111, 71, 0.1)';
            ctx.lineWidth = 1;

            for (let i = 0; i <= canvas.width; i += 50) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, canvas.height);
                ctx.stroke();
            }

            for (let i = 0; i <= canvas.height; i += 50) {
                ctx.beginPath();
                ctx.moveTo(0, i);
                ctx.lineTo(canvas.width, i);
                ctx.stroke();
            }
        }

        // Рисование текста
        function drawText() {
            ctx.fillStyle = COLORS.brownLight;
            ctx.font = `bold ${canvas.width * 0.04}px Arial`;
            ctx.fillText(`Score: ${gameState.score}`, 20, 40);
            ctx.fillText(`Level: ${gameState.level}`, canvas.width - 150, 40);

            if (gameState.paused) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = COLORS.brownLight;
                ctx.font = `bold ${canvas.width * 0.1}px Arial`;
                ctx.textAlign = 'center';
                ctx.fillText('ПАУЗА', canvas.width / 2, canvas.height / 2);
                ctx.textAlign = 'left';
            }
        }

        // Основной цикл игры
        function gameLoop() {
            if (!gameState.running || gameState.paused) {
                requestAnimationFrame(gameLoop);
                return;
            }

            // Обновление
            updatePlayer();
            spawnObjects();

            // Обновление монет
            for (let i = coins.length - 1; i >= 0; i--) {
                coins[i].update();
                if (coins[i].isOffScreen()) {
                    coins.splice(i, 1);
                }
            }

            // Обновление препятствий
            for (let i = obstacles.length - 1; i >= 0; i--) {
                obstacles[i].update();
                if (obstacles[i].isOffScreen()) {
                    obstacles.splice(i, 1);
                }
            }

            checkCollisions();
            updateLevel();

            // Рисование
            drawBackground();

            // Рисуем монеты
            for (let coin of coins) {
                coin.draw();
            }

            // Рисуем препятствия
            for (let obstacle of obstacles) {
                obstacle.draw();
            }

            drawPlayer();
            drawText();

            // Обновление UI
            document.getElementById('score').textContent = gameState.score;
            document.getElementById('level').textContent = gameState.level;

            requestAnimationFrame(gameLoop);
        }

        // Game Over
        function gameOver() {
            gameState.running = false;
            gameState.gameOver = true;
            document.getElementById('status').textContent = 'КОНЕЦ ИГРЫ';
            document.getElementById('status').style.color = COLORS.brownAccent;
            document.getElementById('startBtn').textContent = '▶️ Начать Заново';
            document.getElementById('pauseBtn').disabled = true;
        }

        // Начать игру
        function startGame() {
            if (gameState.gameOver) {
                resetGame();
            }
            gameState.running = true;
            gameState.paused = false;
            gameState.gameOver = false;
            document.getElementById('status').textContent = 'ИГРАЮ';
            document.getElementById('status').style.color = COLORS.brownLight;
            document.getElementById('pauseBtn').disabled = false;
            document.getElementById('startBtn').textContent = '▶️ Продолжить';
        }

        // Пауза
        function togglePause() {
            if (gameState.running) {
                gameState.paused = !gameState.paused;
                document.getElementById('pauseBtn').textContent = gameState.paused ? '▶️ Продолжить' : '⏸️ Пауза';
                document.getElementById('status').textContent = gameState.paused ? 'ПАУЗА' : 'ИГРАЮ';
            }
        }

        // Новая игра
        function resetGame() {
            gameState.score = 0;
            gameState.level = 1;
            gameState.running = false;
            gameState.paused = false;
            gameState.gameOver = false;
            coins = [];
            obstacles = [];
            initPlayer();
            document.getElementById('score').textContent = '0';
            document.getElementById('level').textContent = '1';
            document.getElementById('status').textContent = 'Готово';
            document.getElementById('status').style.color = COLORS.brownLight;
            document.getElementById('startBtn').textContent = '▶️ Начать Игру';
            document.getElementById('pauseBtn').disabled = true;
        }

        // Event listeners
        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('pauseBtn').addEventListener('click', togglePause);
        document.getElementById('resetBtn').addEventListener('click', resetGame);

        // Управление с клавиатуры
        window.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            if (e.key === ' ') {
                e.preventDefault();
                if (!gameState.running && !gameState.paused) {
                    startGame();
                }
            }
        });

        window.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        // Инициализация
        initPlayer();
        gameLoop();
    </script>
</body>
</html>
